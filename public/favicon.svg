<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark plum background, matching the manifest theme color -->
  <rect width="64" height="64" rx="10" fill="#1a1428"/>
  <!-- Five wedges of the MTG color wheel, starting White at top going clockwise -->
  <g transform="translate(32 32)">
    <!-- Each wedge is a pie slice from -126° to +126° in 72° steps.
         Path uses arc commands; cx,cy=0,0, radius=26. -->
    <path d="M0 0 L 15.28 -21.04 A 26 26 0 0 1 24.74 8.04 Z" fill="#6cb8e0"/>  <!-- U -->
    <path d="M0 0 L 24.74 8.04 A 26 26 0 0 1 0 26 Z" fill="#8a7a92"/>          <!-- B -->
    <path d="M0 0 L 0 26 A 26 26 0 0 1 -24.74 8.04 Z" fill="#e06d5a"/>         <!-- R -->
    <path d="M0 0 L -24.74 8.04 A 26 26 0 0 1 -15.28 -21.04 Z" fill="#6fb06f"/><!-- G -->
    <path d="M0 0 L -15.28 -21.04 A 26 26 0 0 1 15.28 -21.04 Z" fill="#f3e3a8"/><!-- W -->
    <!-- Inner dark disc -->
    <circle r="9" fill="#1a1428" stroke="#8a7aa8" stroke-width="1.5"/>
  </g>
</svg>
